<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="gh-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6aab25" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" rx="12" fill="#f8fafc"/>
  <rect x="20" y="20" width="440" height="260" rx="8" fill="url(#gh-bg)"/>
  <!-- Main branch line -->
  <line x1="80" y1="150" x2="400" y2="150" stroke="#0099b5" stroke-width="3" stroke-linecap="round"/>
  <!-- Main branch nodes -->
  <circle cx="100" cy="150" r="7" fill="#6aab25"/>
  <circle cx="100" cy="150" r="3.5" fill="#f8fafc"/>
  <circle cx="180" cy="150" r="7" fill="#6aab25"/>
  <circle cx="180" cy="150" r="3.5" fill="#f8fafc"/>
  <circle cx="280" cy="150" r="7" fill="#6aab25"/>
  <circle cx="280" cy="150" r="3.5" fill="#f8fafc"/>
  <circle cx="380" cy="150" r="7" fill="#6aab25"/>
  <circle cx="380" cy="150" r="3.5" fill="#f8fafc"/>
  <!-- Feature branch 1 (upper) -->
  <path d="M180,150 C190,130 200,90 220,80" fill="none" stroke="#0099b5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="220" y1="80" x2="320" y2="80" stroke="#0099b5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M320,80 C340,90 350,130 380,150" fill="none" stroke="#0099b5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Feature branch 1 nodes -->
  <circle cx="220" cy="80" r="6" fill="#6aab25"/>
  <circle cx="220" cy="80" r="3" fill="#f8fafc"/>
  <circle cx="270" cy="80" r="6" fill="#6aab25"/>
  <circle cx="270" cy="80" r="3" fill="#f8fafc"/>
  <circle cx="320" cy="80" r="6" fill="#6aab25"/>
  <circle cx="320" cy="80" r="3" fill="#f8fafc"/>
  <!-- Feature branch 2 (lower) -->
  <path d="M100,150 C110,170 120,210 140,220" fill="none" stroke="#0099b5" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="140" y1="220" x2="240" y2="220" stroke="#0099b5" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M240,220 C260,210 270,170 280,150" fill="none" stroke="#0099b5" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Feature branch 2 nodes -->
  <circle cx="140" cy="220" r="6" fill="#6aab25" opacity="0.8"/>
  <circle cx="140" cy="220" r="3" fill="#f8fafc"/>
  <circle cx="190" cy="220" r="6" fill="#6aab25" opacity="0.8"/>
  <circle cx="190" cy="220" r="3" fill="#f8fafc"/>
  <circle cx="240" cy="220" r="6" fill="#6aab25" opacity="0.8"/>
  <circle cx="240" cy="220" r="3" fill="#f8fafc"/>
  <!-- Short branch 3 (upper-right) -->
  <path d="M280,150 C290,135 300,115 310,108" fill="none" stroke="#6aab25" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <circle cx="310" cy="108" r="5" fill="#6aab25" opacity="0.6"/>
  <circle cx="310" cy="108" r="2.5" fill="#f8fafc"/>
  <circle cx="340" cy="108" r="5" fill="#6aab25" opacity="0.6"/>
  <circle cx="340" cy="108" r="2.5" fill="#f8fafc"/>
  <line x1="310" y1="108" x2="340" y2="108" stroke="#6aab25" stroke-width="1.5" opacity="0.4"/>
  <!-- Subtle commit dots on main line -->
  <circle cx="130" cy="150" r="3" fill="#0099b5" opacity="0.3"/>
  <circle cx="230" cy="150" r="3" fill="#0099b5" opacity="0.3"/>
  <circle cx="330" cy="150" r="3" fill="#0099b5" opacity="0.3"/>
  <!-- Merge indicators -->
  <circle cx="180" cy="150" r="11" fill="none" stroke="#6aab25" stroke-width="1.5" opacity="0.3"/>
  <circle cx="280" cy="150" r="11" fill="none" stroke="#6aab25" stroke-width="1.5" opacity="0.3"/>
  <circle cx="380" cy="150" r="11" fill="none" stroke="#6aab25" stroke-width="1.5" opacity="0.3"/>
  <!-- Decorative background lines -->
  <line x1="60" y1="50" x2="60" y2="250" stroke="#0099b5" stroke-width="1" opacity="0.06" stroke-dasharray="4,8"/>
  <line x1="420" y1="50" x2="420" y2="250" stroke="#6aab25" stroke-width="1" opacity="0.06" stroke-dasharray="4,8"/>
</svg>