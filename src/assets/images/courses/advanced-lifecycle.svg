<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none">
  <defs>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0099b5" opacity="0.5"/>
    </marker>
  </defs>
  <rect width="480" height="300" rx="8" fill="#f8fafc"/>

  <!-- Main circular arc — teal -->
  <!-- Arc drawn as a near-complete circle with a gap at the top for the arrow -->
  <path d="M300,60 A100,100 0 0,1 310,245" stroke="#0099b5" stroke-width="2.5" opacity="0.35" fill="none" stroke-linecap="round"/>
  <path d="M310,245 A100,100 0 0,1 170,245" stroke="#0099b5" stroke-width="2.5" opacity="0.3" fill="none" stroke-linecap="round"/>
  <path d="M170,245 A100,100 0 0,1 165,60" stroke="#0099b5" stroke-width="2.5" opacity="0.35" fill="none" stroke-linecap="round"/>

  <!-- Top arc segment with arrow -->
  <path d="M165,60 A100,100 0 0,1 280,52" stroke="#0099b5" stroke-width="2.5" opacity="0.4" fill="none" stroke-linecap="round" marker-end="url(#arrowTeal)"/>

  <!-- Inner decorative ring -->
  <circle cx="240" cy="150" r="70" stroke="#0099b5" stroke-width="1" opacity="0.1" fill="none"/>

  <!-- Stage connector arcs (subtle inner connections) -->
  <path d="M240,55 Q270,100 310,100" stroke="#0099b5" stroke-width="0.8" opacity="0.1" fill="none"/>
  <path d="M310,100 Q320,150 300,200" stroke="#0099b5" stroke-width="0.8" opacity="0.1" fill="none"/>
  <path d="M300,200 Q260,230 210,215" stroke="#0099b5" stroke-width="0.8" opacity="0.1" fill="none"/>
  <path d="M210,215 Q170,180 175,120" stroke="#0099b5" stroke-width="0.8" opacity="0.1" fill="none"/>
  <path d="M175,120 Q195,80 240,55" stroke="#0099b5" stroke-width="0.8" opacity="0.1" fill="none"/>

  <!-- Stage 1: Top (12 o'clock) -->
  <circle cx="240" cy="48" r="18" fill="#6aab25" opacity="0.2" stroke="#6aab25" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="240" cy="48" r="8" fill="#6aab25" opacity="0.4"/>

  <!-- Stage 2: Right (2 o'clock) -->
  <circle cx="332" cy="108" r="18" fill="#6aab25" opacity="0.2" stroke="#6aab25" stroke-width="2" stroke-opacity="0.55"/>
  <circle cx="332" cy="108" r="8" fill="#6aab25" opacity="0.35"/>

  <!-- Stage 3: Bottom-right (5 o'clock) -->
  <circle cx="318" cy="228" r="18" fill="#6aab25" opacity="0.2" stroke="#6aab25" stroke-width="2" stroke-opacity="0.55"/>
  <circle cx="318" cy="228" r="8" fill="#6aab25" opacity="0.35"/>

  <!-- Stage 4: Bottom-left (7 o'clock) -->
  <circle cx="162" cy="228" r="18" fill="#6aab25" opacity="0.2" stroke="#6aab25" stroke-width="2" stroke-opacity="0.55"/>
  <circle cx="162" cy="228" r="8" fill="#6aab25" opacity="0.35"/>

  <!-- Stage 5: Left (10 o'clock) -->
  <circle cx="148" cy="108" r="18" fill="#6aab25" opacity="0.2" stroke="#6aab25" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="148" cy="108" r="8" fill="#6aab25" opacity="0.4"/>

  <!-- Small directional dots between stages along the arc -->
  <circle cx="295" cy="68" r="2.5" fill="#0099b5" opacity="0.3"/>
  <circle cx="340" cy="170" r="2.5" fill="#0099b5" opacity="0.25"/>
  <circle cx="240" cy="252" r="2.5" fill="#0099b5" opacity="0.25"/>
  <circle cx="142" cy="170" r="2.5" fill="#0099b5" opacity="0.25"/>
  <circle cx="185" cy="68" r="2.5" fill="#0099b5" opacity="0.3"/>

  <!-- Center decoration — subtle convergence point -->
  <circle cx="240" cy="150" r="5" fill="#0099b5" opacity="0.15"/>
  <circle cx="240" cy="150" r="2" fill="#0099b5" opacity="0.3"/>
</svg>