<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="opt-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6aab25" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="opt-grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5"/>
      <stop offset="100%" stop-color="#6aab25"/>
    </linearGradient>
    <linearGradient id="opt-arrow-tl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0099b5"/>
    </linearGradient>
    <linearGradient id="opt-arrow-tr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6aab25" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6aab25"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" rx="12" fill="#f8fafc"/>
  <rect x="20" y="20" width="440" height="260" rx="8" fill="url(#opt-grad1)"/>
  <!-- Outer ring of nodes -->
  <circle cx="120" cy="60" r="8" fill="#0099b5" opacity="0.3"/>
  <circle cx="360" cy="60" r="8" fill="#6aab25" opacity="0.3"/>
  <circle cx="80" cy="150" r="8" fill="#0099b5" opacity="0.35"/>
  <circle cx="400" cy="150" r="8" fill="#6aab25" opacity="0.35"/>
  <circle cx="120" cy="240" r="8" fill="#6aab25" opacity="0.3"/>
  <circle cx="360" cy="240" r="8" fill="#0099b5" opacity="0.3"/>
  <!-- Mid ring nodes -->
  <circle cx="180" cy="100" r="6" fill="#0099b5" opacity="0.5"/>
  <circle cx="300" cy="100" r="6" fill="#6aab25" opacity="0.5"/>
  <circle cx="150" cy="150" r="6" fill="#0099b5" opacity="0.55"/>
  <circle cx="330" cy="150" r="6" fill="#6aab25" opacity="0.55"/>
  <circle cx="180" cy="200" r="6" fill="#6aab25" opacity="0.5"/>
  <circle cx="300" cy="200" r="6" fill="#0099b5" opacity="0.5"/>
  <!-- Converging arrows from outer nodes -->
  <line x1="120" y1="60" x2="225" y2="140" stroke="#0099b5" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="360" y1="60" x2="255" y2="140" stroke="#6aab25" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="80" y1="150" x2="220" y2="150" stroke="#0099b5" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="400" y1="150" x2="260" y2="150" stroke="#6aab25" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="120" y1="240" x2="225" y2="160" stroke="#6aab25" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="360" y1="240" x2="255" y2="160" stroke="#0099b5" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <!-- Converging arrows from mid nodes -->
  <line x1="180" y1="100" x2="230" y2="142" stroke="#0099b5" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="300" y1="100" x2="250" y2="142" stroke="#6aab25" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="150" y1="150" x2="222" y2="150" stroke="#0099b5" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="330" y1="150" x2="258" y2="150" stroke="#6aab25" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="180" y1="200" x2="230" y2="158" stroke="#6aab25" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="250" y2="158" stroke="#0099b5" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <!-- Arrowheads toward center -->
  <polygon points="228,141 222,135 218,143" fill="#0099b5" opacity="0.7"/>
  <polygon points="252,141 258,135 262,143" fill="#6aab25" opacity="0.7"/>
  <polygon points="223,148 217,142 217,154" fill="#0099b5" opacity="0.7"/>
  <polygon points="257,148 263,142 263,154" fill="#6aab25" opacity="0.7"/>
  <polygon points="228,159 222,165 218,157" fill="#6aab25" opacity="0.7"/>
  <polygon points="252,159 258,165 262,157" fill="#0099b5" opacity="0.7"/>
  <!-- Center convergence point -->
  <circle cx="240" cy="150" r="20" fill="url(#opt-grad2)" opacity="0.15"/>
  <circle cx="240" cy="150" r="13" fill="url(#opt-grad2)" opacity="0.3"/>
  <circle cx="240" cy="150" r="7" fill="url(#opt-grad2)"/>
  <!-- Concentric rings around center -->
  <circle cx="240" cy="150" r="35" fill="none" stroke="#0099b5" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
  <circle cx="240" cy="150" r="55" fill="none" stroke="#6aab25" stroke-width="1" opacity="0.12" stroke-dasharray="6,6"/>
  <circle cx="240" cy="150" r="80" fill="none" stroke="#0099b5" stroke-width="1" opacity="0.08" stroke-dasharray="8,8"/>
</svg>