<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none">
  <rect width="480" height="300" rx="8" fill="#f8fafc"/>

  <!-- Outer concentric circles -->
  <circle cx="240" cy="150" r="110" stroke="#0099b5" stroke-width="1.5" opacity="0.15"/>
  <circle cx="240" cy="150" r="90" stroke="#0099b5" stroke-width="1.5" opacity="0.25"/>
  <circle cx="240" cy="150" r="70" stroke="#0099b5" stroke-width="2" opacity="0.35"/>
  <circle cx="240" cy="150" r="50" stroke="#0099b5" stroke-width="2" opacity="0.5"/>
  <circle cx="240" cy="150" r="30" stroke="#0099b5" stroke-width="2.5" opacity="0.7"/>

  <!-- Radiating measurement lines -->
  <line x1="240" y1="30" x2="240" y2="55" stroke="#0099b5" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="240" y1="245" x2="240" y2="270" stroke="#0099b5" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="120" y1="150" x2="145" y2="150" stroke="#0099b5" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="335" y1="150" x2="360" y2="150" stroke="#0099b5" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Diagonal measurement lines -->
  <line x1="155" y1="65" x2="172" y2="82" stroke="#0099b5" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="325" y1="65" x2="308" y2="82" stroke="#0099b5" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="155" y1="235" x2="172" y2="218" stroke="#0099b5" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="325" y1="235" x2="308" y2="218" stroke="#0099b5" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- Small tick marks on circles -->
  <line x1="240" y1="58" x2="240" y2="65" stroke="#0099b5" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="240" y1="235" x2="240" y2="242" stroke="#0099b5" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="148" y1="150" x2="155" y2="150" stroke="#0099b5" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="325" y1="150" x2="332" y2="150" stroke="#0099b5" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Additional subtle measurement ticks at 30-degree intervals on outer ring -->
  <line x1="295" y1="60" x2="290" y2="68" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="340" y1="105" x2="333" y2="109" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="340" y1="195" x2="333" y2="191" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="295" y1="240" x2="290" y2="232" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="185" y1="240" x2="190" y2="232" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="140" y1="195" x2="147" y2="191" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="140" y1="105" x2="147" y2="109" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="185" y1="60" x2="190" y2="68" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- Center filled circle -->
  <circle cx="240" cy="150" r="14" fill="#0099b5" opacity="0.12"/>

  <!-- Checkmark -->
  <polyline points="222,150 236,164 262,134" stroke="#0099b5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small accuracy dots on the inner ring area -->
  <circle cx="250" cy="122" r="3" fill="#6aab25" opacity="0.5"/>
  <circle cx="265" cy="140" r="2.5" fill="#6aab25" opacity="0.4"/>
  <circle cx="258" cy="165" r="2" fill="#6aab25" opacity="0.35"/>
  <circle cx="220" cy="130" r="2.5" fill="#6aab25" opacity="0.45"/>
  <circle cx="215" cy="160" r="2" fill="#6aab25" opacity="0.3"/>
  <circle cx="245" cy="175" r="3" fill="#6aab25" opacity="0.4"/>
</svg>