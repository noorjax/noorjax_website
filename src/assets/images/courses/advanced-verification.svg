<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="vr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6aab25" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="vr-lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6aab25" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" rx="12" fill="#f8fafc"/>
  <rect x="20" y="20" width="440" height="260" rx="8" fill="url(#vr-bg)"/>
  <!-- Background network/flowchart -->
  <!-- Nodes -->
  <circle cx="140" cy="80" r="10" fill="#0099b5" fill-opacity="0.15" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="230" cy="60" r="10" fill="#0099b5" fill-opacity="0.15" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="320" cy="85" r="10" fill="#6aab25" fill-opacity="0.15" stroke="#6aab25" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="100" cy="155" r="10" fill="#0099b5" fill-opacity="0.15" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="190" cy="140" r="10" fill="#6aab25" fill-opacity="0.15" stroke="#6aab25" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="290" cy="155" r="10" fill="#0099b5" fill-opacity="0.15" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="380" cy="140" r="10" fill="#6aab25" fill-opacity="0.15" stroke="#6aab25" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="145" cy="225" r="10" fill="#6aab25" fill-opacity="0.15" stroke="#6aab25" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="240" cy="215" r="10" fill="#0099b5" fill-opacity="0.15" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="340" cy="220" r="10" fill="#6aab25" fill-opacity="0.15" stroke="#6aab25" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Network connections -->
  <line x1="140" y1="80" x2="230" y2="60" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="230" y1="60" x2="320" y2="85" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="140" y1="80" x2="190" y2="140" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="230" y1="60" x2="190" y2="140" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <line x1="320" y1="85" x2="290" y2="155" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="320" y1="85" x2="380" y2="140" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <line x1="100" y1="155" x2="190" y2="140" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="190" y1="140" x2="290" y2="155" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <line x1="290" y1="155" x2="380" y2="140" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="100" y1="155" x2="145" y2="225" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <line x1="190" y1="140" x2="240" y2="215" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="290" y1="155" x2="240" y2="215" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <line x1="290" y1="155" x2="340" y2="220" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="145" y1="225" x2="240" y2="215" stroke="#0099b5" stroke-width="1.2" opacity="0.2"/>
  <line x1="240" y1="215" x2="340" y2="220" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <line x1="380" y1="140" x2="340" y2="220" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <line x1="140" y1="80" x2="100" y2="155" stroke="#6aab25" stroke-width="1.2" opacity="0.2"/>
  <!-- Magnifying glass -->
  <!-- Glass circle -->
  <circle cx="235" cy="145" r="72" fill="url(#vr-lens)" stroke="#0099b5" stroke-width="3" opacity="0.8"/>
  <circle cx="235" cy="145" r="72" fill="none" stroke="#0099b5" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
  <!-- Handle -->
  <line x1="286" y1="196" x2="340" y2="250" stroke="#0099b5" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="286" y1="196" x2="340" y2="250" stroke="#0099b5" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- Magnified nodes inside lens (brighter, larger) -->
  <circle cx="190" cy="140" r="14" fill="#6aab25" fill-opacity="0.25" stroke="#6aab25" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="190" cy="140" r="5" fill="#6aab25" opacity="0.6"/>
  <circle cx="230" cy="110" r="12" fill="#0099b5" fill-opacity="0.2" stroke="#0099b5" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="230" cy="110" r="4" fill="#0099b5" opacity="0.6"/>
  <circle cx="270" cy="150" r="12" fill="#0099b5" fill-opacity="0.2" stroke="#0099b5" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="270" cy="150" r="4" fill="#0099b5" opacity="0.6"/>
  <circle cx="220" cy="175" r="11" fill="#6aab25" fill-opacity="0.2" stroke="#6aab25" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="220" cy="175" r="4" fill="#6aab25" opacity="0.6"/>
  <!-- Magnified connections (brighter) -->
  <line x1="190" y1="140" x2="230" y2="110" stroke="#0099b5" stroke-width="2" opacity="0.5"/>
  <line x1="230" y1="110" x2="270" y2="150" stroke="#6aab25" stroke-width="2" opacity="0.5"/>
  <line x1="190" y1="140" x2="270" y2="150" stroke="#0099b5" stroke-width="2" opacity="0.4"/>
  <line x1="190" y1="140" x2="220" y2="175" stroke="#6aab25" stroke-width="2" opacity="0.5"/>
  <line x1="270" y1="150" x2="220" y2="175" stroke="#0099b5" stroke-width="2" opacity="0.4"/>
  <!-- Small inspection markers -->
  <circle cx="210" cy="125" r="3" fill="#6aab25" opacity="0.7"/>
  <circle cx="250" cy="130" r="3" fill="#0099b5" opacity="0.7"/>
  <circle cx="230" cy="160" r="3" fill="#6aab25" opacity="0.7"/>
  <!-- Glass reflection highlight -->
  <path d="M195,90 Q210,85 215,95" fill="none" stroke="#f8fafc" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>