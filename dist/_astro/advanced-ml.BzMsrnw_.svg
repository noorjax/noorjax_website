  <circle cx="200" cy="60" r="11" fill="#0099b5" opacity="0.5" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="200" cy="120" r="11" fill="#0099b5" opacity="0.65" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.8"/>
  <circle cx="200" cy="180" r="11" fill="#0099b5" opacity="0.65" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.8"/>
  <circle cx="200" cy="240" r="11" fill="#0099b5" opacity="0.5" stroke="#0099b5" stroke-width="1.5" stroke-opacity="0.7"/>

