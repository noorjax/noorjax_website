  <circle cx="200" cy="180" r="4" fill="#f8fafc" opacity="0.3"/>
  <circle cx="295" cy="140" r="4" fill="#f8fafc" opacity="0.3"/>
  <circle cx="295" cy="200" r="4" fill="#f8fafc" opacity="0.3"/>
  <circle cx="385" cy="110" r="5" fill="#f8fafc" opacity="0.25"/>
  <circle cx="385" cy="190" r="5" fill="#f8fafc" opacity="0.25"/>
