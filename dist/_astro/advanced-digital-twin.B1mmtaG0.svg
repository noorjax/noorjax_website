<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="dt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6aab25" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="dt-hex1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5"/>
      <stop offset="100%" stop-color="#0099b5" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="dt-hex2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099b5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6aab25"/>
    </linearGradient>
    <linearGradient id="dt-flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0099b5"/>
      <stop offset="50%" stop-color="#6aab25"/>
      <stop offset="100%" stop-color="#0099b5"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" rx="12" fill="#f8fafc"/>
  <rect x="20" y="20" width="440" height="260" rx="8" fill="url(#dt-bg)"/>
  <!-- Left hexagon (physical system) -->
  <polygon points="155,95 195,75 235,95 235,145 195,165 155,145" fill="none" stroke="url(#dt-hex1)" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="165,103 195,88 225,103 225,137 195,152 165,137" fill="#0099b5" opacity="0.08"/>
  <!-- Inner detail left hex -->
  <circle cx="195" cy="120" r="15" fill="#0099b5" opacity="0.12"/>
  <circle cx="195" cy="120" r="8" fill="#0099b5" opacity="0.25"/>
  <circle cx="195" cy="120" r="3" fill="#0099b5"/>
  <!-- Small satellite hexagons left -->
  <polygon points="115,125 130,117 145,125 145,141 130,149 115,141" fill="none" stroke="#0099b5" stroke-width="1.5" opacity="0.3" stroke-linejoin="round"/>
  <polygon points="155,55 170,47 185,55 185,71 170,79 155,71" fill="none" stroke="#0099b5" stroke-width="1.5" opacity="0.25" stroke-linejoin="round"/>
  <!-- Right hexagon (digital twin) -->
  <polygon points="245,155 285,135 325,155 325,205 285,225 245,205" fill="none" stroke="url(#dt-hex2)" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="255,163 285,148 315,163 315,197 285,212 255,197" fill="#6aab25" opacity="0.08"/>
  <!-- Inner detail right hex -->
  <circle cx="285" cy="180" r="15" fill="#6aab25" opacity="0.12"/>
  <circle cx="285" cy="180" r="8" fill="#6aab25" opacity="0.25"/>
  <circle cx="285" cy="180" r="3" fill="#6aab25"/>
  <!-- Small satellite hexagons right -->
  <polygon points="335,165 350,157 365,165 365,181 350,189 335,181" fill="none" stroke="#6aab25" stroke-width="1.5" opacity="0.3" stroke-linejoin="round"/>
  <polygon points="295,225 310,217 325,225 325,241 310,249 295,241" fill="none" stroke="#6aab25" stroke-width="1.5" opacity="0.25" stroke-linejoin="round"/>
  <!-- Data flow lines between hexagons - upper path -->
  <path d="M230,110 C260,100 270,120 280,140" fill="none" stroke="#0099b5" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <circle cx="250" cy="107" r="3" fill="#0099b5" opacity="0.6"/>
  <circle cx="266" cy="118" r="3" fill="#0099b5" opacity="0.5"/>
  <!-- Data flow lines - middle path -->
  <path d="M235,135 Q260,150 245,165" fill="none" stroke="url(#dt-flow)" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <circle cx="242" cy="150" r="4" fill="#0099b5" opacity="0.7"/>
  <!-- Data flow lines - lower path -->
  <path d="M220,150 C230,175 240,180 250,185" fill="none" stroke="#6aab25" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <circle cx="232" cy="168" r="3" fill="#6aab25" opacity="0.5"/>
  <!-- Animated-style data dots along paths -->
  <circle cx="255" cy="132" r="2.5" fill="#0099b5" opacity="0.8"/>
  <circle cx="248" cy="160" r="2.5" fill="#6aab25" opacity="0.8"/>
  <!-- Connection emphasis arc -->
  <path d="M195,165 Q240,200 285,225" fill="none" stroke="#6aab25" stroke-width="1" opacity="0.2" stroke-dasharray="3,5"/>
  <path d="M195,95 Q240,70 285,135" fill="none" stroke="#0099b5" stroke-width="1" opacity="0.2" stroke-dasharray="3,5"/>
  <!-- Subtle background grid dots -->
  <circle cx="60" cy="60" r="1.5" fill="#0099b5" opacity="0.1"/>
  <circle cx="60" cy="100" r="1.5" fill="#0099b5" opacity="0.1"/>
  <circle cx="60" cy="140" r="1.5" fill="#0099b5" opacity="0.1"/>
  <circle cx="420" cy="160" r="1.5" fill="#6aab25" opacity="0.1"/>
  <circle cx="420" cy="200" r="1.5" fill="#6aab25" opacity="0.1"/>
  <circle cx="420" cy="240" r="1.5" fill="#6aab25" opacity="0.1"/>
</svg>